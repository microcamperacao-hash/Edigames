<!DOCTYPE HTML>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>EdiGames</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            :root {
                color-scheme: dark;
                --bg-start: #1b1e4a;
                --bg-end: #0a0d23;
                --card: rgba(33, 39, 83, 0.82);
                --card-border: rgba(255, 255, 255, 0.12);
                --text: #e7ebff;
                --accent: #7d82ff;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html, body {
                min-height: 100%;
            }

            body {
                font-family: 'Inter', Arial, sans-serif;
                background: radial-gradient(circle at top, rgba(123, 135, 255, 0.22), transparent 35%),
                            linear-gradient(180deg, var(--bg-start), var(--bg-end));
                color: var(--text);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem;
            }

            .page {
                width: min(100%, 980px);
                text-align: center;
            }

            .page h1 {
                font-size: clamp(2.4rem, 3.4vw, 4rem);
                letter-spacing: -0.04em;
                margin-bottom: 1.4rem;
                text-transform: uppercase;
                color: #f4f7ff;
                text-shadow: 0 18px 40px rgba(25, 35, 120, 0.25);
            }

            .logo-list {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 1rem;
                list-style: none;
            }

            .logo-item {
                background: var(--card);
                border: 1px solid var(--card-border);
                border-radius: 24px;
                padding: 1.35rem 1rem;
                box-shadow: 0 18px 60px rgba(9, 14, 51, 0.22);
                backdrop-filter: blur(12px);
                transition: transform 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
            }

            .logo-item:hover {
                transform: translateY(-6px);
                border-color: rgba(125, 130, 255, 0.35);
                box-shadow: 0 28px 80px rgba(10, 16, 58, 0.35);
            }

            .logo-item span {
                display: block;
                font-weight: 700;
                color: var(--text);
            }

            .logo-item:nth-child(1) span { font-size: 3.2rem; }
            .logo-item:nth-child(2) span { font-size: 2.6rem; }
            .logo-item:nth-child(3) span { font-size: 2.2rem; }
            .logo-item:nth-child(4) span { font-size: 1.9rem; }
            .logo-item:nth-child(5) span { font-size: 1.6rem; }
            .logo-item:nth-child(6) span { font-size: 1.4rem; }
            .logo-item:nth-child(7) span { font-size: 1.5rem; }
            .logo-item:nth-child(8) span { font-size: 1.75rem; }
            .logo-item:nth-child(9) span { font-size: 2.05rem; }

            .logo-item::after {
                content: 'Tamanho aplicado com CSS';
                display: block;
                margin-top: 0.85rem;
                font-size: 0.95rem;
                color: rgba(231, 235, 255, 0.72);
            }
        </style>
    </head>
    <body>
        <section class="page">
            <h1>EdiGames</h1>
            <ul class="logo-list">
                <li class="logo-item"><span>EdiGames</span></li>
                <li class="logo-item"><span>EdiGames</span></li>
                <li class="logo-item"><span>EdiGames</span></li>
                <li class="logo-item"><span>EdiGames</span></li>
                <li class="logo-item"><span>EdiGames</span></li>
                <li class="logo-item"><span>EdiGames</span></li>
                <li class="logo-item"><span>EdiGames</span></li>
                <li class="logo-item"><span>EdiGames</span></li>
                <li class="logo-item"><span>EdiGames</span></li>
            </ul>
        </section>
    </body>
</html>
