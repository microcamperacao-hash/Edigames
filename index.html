<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edigar | O Jogo</title>
    <style>
        /* Estilos básicos para o jogo ocupar a tela toda no celular */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita rolagem da tela */
            background-color: #e2e8f0;
            touch-action: none; /* Evita zoom ao tocar rápido no celular */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB, #e0f6ff); /* Fundo de céu */
        }

        #placar {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #1e40af;
            z-index: 10;
        }

        #gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        #gameover h1 { margin-top: 0; color: #ef4444; }
        #gameover p { font-size: 18px; color: #333; }
        
        .btn-restart {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="placar">Pontos: 0</div>

    <div id="gameover">
        <h1>Fim de Jogo!</h1>
        <p>Pontuação do Edigar: <span id="pontuacaoFinal">0</span></p>
        <button class="btn-restart" onclick="reiniciarJogo()">Jogar Novamente</button>
    </div>

    <canvas id="jogoCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jogoCanvas");
        const ctx = canvas.getContext("2d");
        const placarElemento = document.getElementById("placar");
        const telaGameOver = document.getElementById("gameover");
        const pontuacaoFinal = document.getElementById("pontuacaoFinal");

        // Ajustar o canvas para o tamanho da tela do celular/PC
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Variáveis do Jogo
        let frames = 0;
        let pontos = 0;
        let jogoAtivo = true;
        const chaoY = canvas.height - 50; // Posição do chão

        // O Jogador (Edigar)
        const edigar = {
            x: 50,
            y: chaoY - 40,
            largura: 40,
            altura: 40,
            velocidadeY: 0,
            gravidade: 0.6,
            forcaPulo: -12,
            pulando: false,

            desenhar() {
                ctx.fillStyle = "#2563eb"; // Cor azul profissional
                ctx.fillRect(this.x, this.y, this.largura, this.altura);
                
                // Desenhar um "E" dentro do quadrado
                ctx.fillStyle = "white";
                ctx.font = "24px Arial";
                ctx.fillText("E", this.x + 10, this.y + 28);
            },

            atualizar() {
                // Aplicar gravidade
                this.velocidadeY += this.gravidade;
                this.y += this.velocidadeY;

                // Colisão com o chão
                if (this.y + this.altura >= chaoY) {
                    this.y = chaoY - this.altura;
                    this.velocidadeY = 0;
                    this.pulando = false;
                }
            },

            pular() {
                if (!this.pulando) {
                    this.velocidadeY = this.forcaPulo;
                    this.pulando = true;
                }
            }
        };

        // Obstáculos
        const obstaculos = {
            lista: [],
            velocidade: 5,

            desenhar() {
                ctx.fillStyle = "#ef4444"; // Cor vermelha
                for (let i = 0; i < this.lista.length; i++) {
                    let obs = this.lista[i];
                    ctx.fillRect(obs.x, obs.y, obs.largura, obs.altura);
                }
            },

            atualizar() {
                // Criar novos obstáculos
                if (frames % 100 === 0) {
                    let alturaObs = 40 + Math.random() * 40; // Altura aleatória
                    this.lista.push({
                        x: canvas.width,
                        y: chaoY - alturaObs,
                        largura: 30,
                        altura: alturaObs
                    });
                }

                // Mover e verificar colisão
                for (let i = 0; i < this.lista.length; i++) {
                    let obs = this.lista[i];
                    obs.x -= this.velocidade;

                    // Colisão (Borda do Edigar com Borda do Obstáculo)
                    if (
                        edigar.x < obs.x + obs.largura &&
                        edigar.x + edigar.largura > obs.x &&
                        edigar.y < obs.y + obs.altura &&
                        edigar.y + edigar.altura > obs.y
                    ) {
                        gameOver();
                    }

                    // Remover obstáculos que saíram da tela e dar pontos
                    if (obs.x + obs.largura < 0) {
                        this.lista.shift();
                        pontos++;
                        placarElemento.innerText = `Pontos: ${pontos}`;
                        i--; // Ajustar índice após remover
                        
                        // Aumentar dificuldade aos poucos
                        if(pontos % 5 === 0) this.velocidade += 0.5; 
                    }
                }
            }
        };

        // Controles (Toque na tela ou clique do mouse)
        window.addEventListener("mousedown", () => { sePodePular() });
        window.addEventListener("touchstart", () => { sePodePular() });

        function sePodePular() {
            if (jogoAtivo) {
                edigar.pular();
            }
        }

        function desenharChao() {
            ctx.fillStyle = "#64748b"; // Cor do chão
            ctx.fillRect(0, chaoY, canvas.width, canvas.height - chaoY);
        }

        // Loop Principal do Jogo
        function loop() {
            if (!jogoAtivo) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpar tela

            desenharChao();
            edigar.atualizar();
            edigar.desenhar();
            
            obstaculos.atualizar();
            obstaculos.desenhar();

            frames++;
            requestAnimationFrame(loop);
        }

        function gameOver() {
            jogoAtivo = false;
            telaGameOver.style.display = "block";
            pontuacaoFinal.innerText = pontos;
        }

        function reiniciarJogo() {
            edigar.y = chaoY - 40;
            edigar.velocidadeY = 0;
            obstaculos.lista = [];
            obstaculos.velocidade = 5;
            pontos = 0;
            frames = 0;
            placarElemento.innerText = `Pontos: 0`;
            telaGameOver.style.display = "none";
            jogoAtivo = true;
            loop();
        }

        // Ajustar tamanho se virar o celular
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Iniciar Jogo
        loop();

    </script>
</body>
</html>
